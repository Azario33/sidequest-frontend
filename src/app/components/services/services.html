<!-- Hero Section -->
<div class="bg-blue-50 py-16 px-4 text-center">
  <h1 class="text-4xl font-bold text-blue-700 mb-4">Find Skilled Tradespeople Near You</h1>
  <p class="text-gray-500 text-lg mb-8">Plumbers, electricians, carpenters and more — local and reliable.</p>
  <div class="max-w-xl mx-auto flex gap-2">
    <input type="text" placeholder="What service are you looking for?"
      class="flex-1 px-4 py-3 rounded-l-full border border-gray-300 focus:outline-none focus:border-blue-500" />
    <button class="bg-blue-600 text-white px-6 py-3 rounded-r-full font-semibold hover:bg-blue-700 transition">
      Search
    </button>
  </div>
</div>

<!-- Services Section -->
<div class="max-w-7xl mx-auto px-4 py-12">
  <h2 class="text-2xl font-bold text-gray-800 mb-8">Available Services</h2>

  <div *ngIf="loading" class="text-center text-gray-500 py-12">Loading services...</div>
  <div *ngIf="error" class="text-center text-red-500 py-12">Failed to load services.</div>

  <div *ngIf="!loading && !error">
    <div *ngIf="services.length === 0" class="text-center text-gray-400 py-12">
      No services available yet.
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let service of services"
        class="bg-white rounded-2xl shadow-md hover:shadow-xl transition p-6 border border-gray-100">
        <div class="bg-blue-100 text-blue-600 text-sm font-semibold px-3 py-1 rounded-full inline-block mb-3">
          {{ service.category }}
        </div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">{{ service.title }}</h3>
        <p class="text-gray-500 text-sm mb-4">{{ service.description }}</p>
        <div class="flex justify-between items-center">
          <span class="text-blue-600 font-bold text-lg">${{ service.price }}</span>
          <button class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-semibold hover:bg-blue-700 transition">
            Request
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
