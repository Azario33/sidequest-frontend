<div class="max-w-3xl mx-auto px-4 py-12">

  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Notifications</h1>
    <p class="text-gray-500 mt-1">Stay up to date with your requests and services.</p>
  </div>

  <div *ngIf="loading" class="space-y-3">
    <div *ngFor="let i of [1,2,3]" class="bg-white rounded-2xl shadow p-5 border border-gray-100 animate-pulse">
      <div class="flex gap-4 items-start">
        <div class="w-10 h-10 bg-gray-200 rounded-full"></div>
        <div class="flex-1">
          <div class="h-4 bg-gray-200 rounded-full w-3/4 mb-2"></div>
          <div class="h-3 bg-gray-200 rounded-full w-1/3"></div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="error" class="text-center text-red-500 py-12">Failed to load notifications.</div>

  <div *ngIf="!loading && !error">

    <div *ngIf="notifications.length === 0"
      class="text-center text-gray-400 py-16 bg-white rounded-2xl shadow border border-gray-100">
      <p class="text-5xl mb-4">🔔</p>
      <p class="font-semibold text-lg text-gray-600">No notifications yet</p>
      <p class="text-sm">You'll be notified when requests are updated or received.</p>
    </div>

    <div class="space-y-3">
      <div *ngFor="let notification of notifications"
        [class]="notification.is_read ? 'bg-white border-gray-100' : 'bg-blue-50 border-blue-100'"
        class="rounded-2xl shadow p-5 border flex gap-4 items-start transition">

        <div [class]="notification.is_read ? 'bg-gray-100 text-gray-400' : 'bg-blue-100 text-blue-600'"
          class="w-10 h-10 rounded-full flex items-center justify-center text-lg flex-shrink-0">
          🔔
        </div>

        <div class="flex-1">
          <p [class]="notification.is_read ? 'text-gray-600' : 'text-gray-800 font-medium'">
            {{ notification.message }}
          </p>
          <p class="text-xs text-gray-400 mt-1">{{ notification.created_at | date:'medium' }}</p>
        </div>

        <div *ngIf="!notification.is_read"
          class="w-2.5 h-2.5 bg-blue-500 rounded-full mt-1.5 flex-shrink-0">
        </div>

      </div>
    </div>

  </div>
</div>
