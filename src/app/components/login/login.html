<div class="min-h-screen bg-blue-50 flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-600">Side<span class="text-yellow-400">Quest</span></h1>
      <p class="text-gray-500 mt-2">Welcome back! Please login.</p>
    </div>

    <div *ngIf="error" class="bg-red-100 text-red-600 px-4 py-3 rounded-lg mb-4 text-sm">
      {{ error }}
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-medium mb-1">Username</label>
      <input [(ngModel)]="username" type="text" placeholder="Enter your username"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" />
    </div>

    <div class="mb-6">
      <label class="block text-gray-700 font-medium mb-1">Password</label>
      <input [(ngModel)]="password" type="password" placeholder="Enter your password"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" />
    </div>

    <button (click)="onSubmit()" [disabled]="loading"
      class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:opacity-50">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="text-center text-gray-500 mt-6 text-sm">
      Don't have an account?
      <a routerLink="/register" class="text-blue-600 font-semibold hover:underline">Register here</a>
    </p>

  </div>
</div>
