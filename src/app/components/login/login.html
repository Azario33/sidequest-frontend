<div class="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="/services" class="text-4xl font-bold text-white">
        Side<span class="text-yellow-300">Quest</span>
      </a>
      <p class="text-blue-200 mt-2">Welcome back! Sign in to continue.</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8">

      <h2 class="text-2xl font-bold text-gray-800 mb-6">Sign In</h2>

      <!-- Error -->
      <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-4 text-sm">
        ⚠️ {{ errorMessage }}
      </div>

      <!-- Username -->
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2 text-sm">Username</label>
        <input [(ngModel)]="username" type="text" placeholder="Enter your username"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm transition" />
      </div>

      <!-- Password -->
      <div class="mb-6">
        <div class="flex justify-between items-center mb-2">
          <label class="text-gray-700 font-medium text-sm">Password</label>
          <a href="#" class="text-blue-600 text-xs hover:underline">Forgot password?</a>
        </div>
        <input [(ngModel)]="password" type="password" placeholder="Enter your password"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm transition" />
      </div>

      <!-- Submit -->
      <button (click)="login()" [disabled]="loading"
        class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition disabled:opacity-50 text-sm">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-gray-400 text-xs">or</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Register Link -->
      <p class="text-center text-sm text-gray-500">
        Don't have an account?
        <a href="/register" class="text-blue-600 font-semibold hover:underline">Create one here</a>
      </p>

    </div>

    <!-- Footer -->
    <p class="text-center text-blue-200 text-xs mt-6">© 2026 SideQuest. All rights reserved.</p>

  </div>
</div>
